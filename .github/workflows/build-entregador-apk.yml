name: Build Entregador APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'Entregador/**'
      - '.github/workflows/build-entregador-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Entregador

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entregador-debug-apk
          path: Entregador/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
